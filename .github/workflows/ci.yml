name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        torch-version: ["2.0.1", "2.1.2", "2.2.2", "2.3.1"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "torch==${{ matrix.torch-version }}" --index-url https://download.pytorch.org/whl/cpu
          pip install -e .[dev]

      - name: Run Ruff
        run: ruff check src tests

      - name: Run mypy (strict)
        run: mypy --strict src/pyfolds/serialization/strategies.py src/pyfolds/telemetry/low_overhead.py tests/test_neuron_properties.py

      - name: Run pytest with coverage
        run: pytest --cov=src/pyfolds --cov-report=term-missing --cov-fail-under=85

      - name: Benchmark regression detector
        run: python benchmarks/regression_detector.py
